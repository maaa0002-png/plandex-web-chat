services:
  - type: web
    name: plandex-web-chat
    runtime: node
    plan: free
    buildCommand: npm install -g bun && bun install && NITRO_PRESET=node-server bun run build
    startCommand: node .output/server/index.mjs
    envVars:
      - key: LOVABLE_API_KEY
        sync: false
      - key: NODE_VERSION
        value: 20
      - key: NITRO_PRESET
        value: node-server